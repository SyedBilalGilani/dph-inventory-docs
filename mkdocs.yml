site_name: DPH Inventory System
site_description: Easy Inventory System for Unreal Engine 5 — Blueprint Only, No Plugins Required
site_author: DevPlayHub

theme:
  name: material
  palette:
    - scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  font:
    text: DM Sans
    code: JetBrains Mono
  features:
    - navigation.top
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - tables
  - attr_list
  - md_in_html

nav:
  - Home: index.md
